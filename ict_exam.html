<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICT Bootstrap Exam</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 20px;
}

.option {
  padding: 10px;
  border-radius: 10px;
  margin: 5px 0;
  cursor: pointer;
  transition: 0.3s;
  background: rgba(255,255,255,0.1);
}

.option:hover {
  background: #0dcaf0;
  color: black;
}

.timer {
  font-weight: bold;
  color: #ff4d4d;
}

.progress {
  height: 8px;
}
</style>

</head>

<body>

<div class="container py-4">

  <h2 class="text-center mb-4 text-info">🚀 ICT Smart Exam</h2>

  <div class="card p-4 shadow-lg">

    <div class="d-flex justify-content-between mb-2">
      <div>Answer all questions</div>
      <div class="timer" id="timer">05:00</div>
    </div>

    <div class="progress mb-3">
      <div class="progress-bar bg-info" id="progressBar" style="width:0%"></div>
    </div>

    <form id="quiz"></form>

    <button class="btn btn-info w-100 mt-3" onclick="submitQuiz()">Submit Exam</button>

    <div class="text-center mt-3 fs-4" id="result"></div>

  </div>

</div>

<script>

const questions = [
{q:"What is data?", a:["Raw facts","Processed","Output","Storage"], c:0},
{q:"What is ICT?", a:["Tech","Information & Communication Technology","System","None"], c:1},
{q:"CPU is?", a:["Brain","Memory","Disk","Printer"], c:0},
{q:"ATM used for?", a:["Education","Banking","Health","Games"], c:1},
{q:"MRI used in?", a:["Health","Transport","Edu","Farm"], c:0}
];

let quiz = document.getElementById("quiz");

// CREATE QUESTIONS
questions.forEach((item, index)=>{
  let div = document.createElement("div");
  div.className="mb-3";

  let html = `<p><b>${index+1}. ${item.q}</b></p>`;

  item.a.forEach((opt,i)=>{
    html += `
    <label class="option w-100">
      <input type="radio" name="q${index}" value="${i}" class="me-2">
      ${opt}
    </label>`;
  });

  div.innerHTML = html;
  quiz.appendChild(div);
});

// TIMER
let time = 300;
setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerHTML =
    `${m}:${s<10?"0":""}${s}`;
  time--;

  if(time <= 0){
    submitQuiz();
  }
},1000);

// PROGRESS
document.addEventListener("change", ()=>{
  let answered = document.querySelectorAll("input:checked").length;
  let percent = (answered / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
});

// SUBMIT
function submitQuiz(){
  let score=0;

  questions.forEach((q,i)=>{
    let ans = document.querySelector(`input[name=q${i}]:checked`);
    if(ans && parseInt(ans.value)===q.c){
      score++;
    }
  });

  document.getElementById("result").innerHTML =
    `🔥 Score: ${score} / ${questions.length}`;
}

</script>

</body>
</html>
