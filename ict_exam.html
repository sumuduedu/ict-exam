<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICT Smart Exam</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
  background: rgba(0,0,0,0.3);
}

/* CARD */
.container {
  max-width: 900px;
  margin: 30px auto;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* TIMER */
.timer {
  text-align: right;
  font-size: 18px;
  color: #ff4d4d;
}

/* PROGRESS */
.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin: 10px 0;
}

.progress-bar {
  height: 8px;
  width: 0%;
  background: #00ffcc;
  border-radius: 10px;
}

/* QUESTION */
.question {
  margin-bottom: 20px;
  padding: 15px;
  border-radius: 12px;
  background: rgba(0,0,0,0.4);
}

/* OPTIONS */
.option {
  display: block;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.3s;
}

.option:hover {
  background: rgba(255,255,255,0.25);
}

input[type="radio"] {
  display: none;
}

input[type="radio"]:checked + span {
  background: #00c6ff;
  color: black;
  padding: 5px 10px;
  border-radius: 6px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

/* RESULT */
.result {
  text-align: center;
  font-size: 22px;
  margin-top: 15px;
}
</style>

</head>

<body>

<div class="header">🚀 ICT Smart Exam</div>

<div class="container">

<div class="timer" id="timer">Time: 05:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<form id="quiz"></form>

<button onclick="submitQuiz()">Submit Exam</button>

<div class="result" id="result"></div>

</div>

<script>

const questions = [
{q:"What is data?", a:["Raw facts","Processed","Output","Storage"], c:0},
{q:"What is ICT?", a:["Tech","Information & Communication Technology","System","None"], c:1},
{q:"CPU is?", a:["Brain","Memory","Disk","Printer"], c:0},
{q:"ATM used for?", a:["Education","Banking","Health","Games"], c:1},
{q:"MRI used in?", a:["Health","Transport","Edu","Farm"], c:0}
];

let quiz = document.getElementById("quiz");

// CREATE QUESTIONS
questions.forEach((item, index)=>{
  let div = document.createElement("div");
  div.className="question";

  let html = `<p><b>${index+1}. ${item.q}</b></p>`;

  item.a.forEach((opt,i)=>{
    html += `
    <label class="option">
      <input type="radio" name="q${index}" value="${i}">
      <span>${opt}</span>
    </label>`;
  });

  div.innerHTML = html;
  quiz.appendChild(div);
});

// TIMER
let time = 300;
setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerHTML =
    `Time: ${m}:${s<10?"0":""}${s}`;
  time--;

  if(time <= 0){
    submitQuiz();
  }
},1000);

// PROGRESS BAR
document.addEventListener("change", ()=>{
  let answered = document.querySelectorAll("input:checked").length;
  let percent = (answered / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
});

// SUBMIT
function submitQuiz(){
  let score=0;

  questions.forEach((q,i)=>{
    let ans = document.querySelector(`input[name=q${i}]:checked`);
    if(ans && parseInt(ans.value)===q.c){
      score++;
    }
  });

  document.getElementById("result").innerHTML =
    `🎉 Your Score: ${score} / ${questions.length}`;
}

</script>

</body>
</html>
