<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICT Neon Exam</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff00cc, #3333ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CARD */
.container {
  max-width: 900px;
  margin: 30px auto;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,255,255,0.2);
}

/* TIMER */
.timer {
  text-align: right;
  font-size: 18px;
  color: #ff4d4d;
  font-weight: bold;
}

/* PROGRESS */
.progress {
  height: 8px;
  background: #111;
  border-radius: 10px;
  margin: 15px 0;
}

.progress-bar {
  height: 8px;
  width: 0%;
  background: linear-gradient(90deg, #00f2fe, #4facfe);
  border-radius: 10px;
  transition: 0.4s;
}

/* QUESTION */
.question {
  margin-bottom: 20px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(0,0,0,0.5);
  box-shadow: 0 0 15px rgba(0,255,255,0.1);
}

/* OPTIONS */
.option {
  display: block;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  background: linear-gradient(90deg, #1f1c2c, #928dab);
  cursor: pointer;
  transition: 0.3s;
  border: 1px solid transparent;
}

.option:hover {
  transform: scale(1.03);
  border: 1px solid #00f2fe;
  box-shadow: 0 0 10px #00f2fe;
}

input[type="radio"] {
  display: none;
}

input[type="radio"]:checked + span {
  background: linear-gradient(90deg, #00f2fe, #4facfe);
  color: black;
  padding: 6px 10px;
  border-radius: 6px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #ff00cc, #3333ff);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff00cc;
}

/* RESULT */
.result {
  text-align: center;
  font-size: 24px;
  margin-top: 20px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="header">⚡ ICT Neon Smart Exam ⚡</div>

<div class="container">

<div class="timer" id="timer">Time: 05:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<form id="quiz"></form>

<button onclick="submitQuiz()">🚀 Submit Exam</button>

<div class="result" id="result"></div>

</div>

<script>

const questions = [
{q:"What is data?", a:["Raw facts","Processed","Output","Storage"], c:0},
{q:"What is ICT?", a:["Tech","Information & Communication Technology","System","None"], c:1},
{q:"CPU is?", a:["Brain","Memory","Disk","Printer"], c:0},
{q:"ATM used for?", a:["Education","Banking","Health","Games"], c:1},
{q:"MRI used in?", a:["Health","Transport","Edu","Farm"], c:0}
];

let quiz = document.getElementById("quiz");

questions.forEach((item, index)=>{
  let div = document.createElement("div");
  div.className="question";

  let html = `<p><b>${index+1}. ${item.q}</b></p>`;

  item.a.forEach((opt,i)=>{
    html += `
    <label class="option">
      <input type="radio" name="q${index}" value="${i}">
      <span>${opt}</span>
    </label>`;
  });

  div.innerHTML = html;
  quiz.appendChild(div);
});

// TIMER
let time = 300;
setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerHTML =
    `Time: ${m}:${s<10?"0":""}${s}`;
  time--;

  if(time <= 0){
    submitQuiz();
  }
},1000);

// PROGRESS
document.addEventListener("change", ()=>{
  let answered = document.querySelectorAll("input:checked").length;
  let percent = (answered / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
});

// SUBMIT
function submitQuiz(){
  let score=0;

  questions.forEach((q,i)=>{
    let ans = document.querySelector(`input[name=q${i}]:checked`);
    if(ans && parseInt(ans.value)===q.c){
      score++;
    }
  });

  document.getElementById("result").innerHTML =
    `🔥 Score: ${score} / ${questions.length}`;
}

</script>

</body>
</html>
